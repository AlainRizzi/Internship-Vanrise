<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Devices</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="Task1_css.css" />
</head>
<body>
    <div class="container text-center mt-5">
        <h1 class="text-primary fw-bold mb-4">Devices</h1>

        <div class="row justify-content-center mb-3">
            <div class="col-md-4 mb-2">
                <input type="text" id="deviceInput" class="form-control"/>
            </div>
            <div class="col-md-auto mb-2">
                <button id="searchBtn" class="btn btn-primary me-2">Search</button>
                <button id="addBtn" class="btn btn-primary me-2">Add</button>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <table class="table table-bordered border-primary text-primary">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                        </tr>
                    </thead>
                    <tbody id="deviceTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="Task1_js.js"></script>
</body>
</html>
