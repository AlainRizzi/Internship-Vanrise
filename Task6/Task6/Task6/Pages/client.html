<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Client Management</title>
    <script>
        if (!sessionStorage.getItem('username')) {
            // Not logged in → redirect to login page
            window.location.href = '/Account/Login';
        }
    </script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" />
    <script src="../Scripts/angular.min.js"></script>
    <script src="../Scripts/angular-animate.min.js"></script>
    <script src="../Scripts/ui-bootstrap-tpls-0.14.3.min.js"></script>
    <script src="../Scripts/client.js"></script>
    <link rel="stylesheet" href="../Content/client.css" />
</head>
<body ng-app="deviceApp" ng-controller="ClientCtrl">
    <nav class="navbar navbar-inverse">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="#">Task 6</a>
            </div>
            <ul class="nav navbar-nav">
                <li><a href="Task6.html">Devices</a></li>
                <li><a href="client.html">Clients</a></li>
                <li><a href="phonenumbers.html">Phone Numbers</a></li>
                <li><a href="PhoneNumberReservation.html">Phone Numbers Reservation</a></li>
                <li><a href="clientReports.html">Client Report</a></li>
                <li><a href="phoneNumbersReport.html">Device Report</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <h2>Clients</h2>

        <div class="form-inline">
            <input type="text" class="form-control" ng-model="searchName" placeholder="Search by name">
            <client-type-selector model="searchType"
                                  get-data="getType()"
                                  mode="search"
                                  is-edit="false">
            </client-type-selector>
            <button class="btn btn-primary" ng-click="filterClients()">Search</button>
            <button class="btn btn-success" ng-click="openModal()">Add</button>
        </div>

        <table class="table table-bordered" style="margin-top: 20px;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Birth Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="client in filteredClients">
                    <td>{{client.ID}}</td>
                    <td>{{client.Name}}</td>
                    <td>{{client.Type == 0 ? 'Individual' : 'Organization'}}</td>
                    <td>{{client.BirthDate | date : 'yyyy-MM-dd'}}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" ng-click="openModal(client)">Edit</button>
                        <button class="btn btn-sm btn-danger" ng-click="deleteClient(client)">Delete</button>
                        <button class="btn btn-sm btn-success" ng-click="openReserveModal(client)">Reserve</button>
                        <button class="btn btn-sm btn-secondary" ng-click="openUnreserveModal(client)"
                                ng-disabled="!client.hasActiveReservation">
                            Unreserve
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Modal Template -->
    <script type="text/ng-template" id="clientModal.html">
        <div class="modal-header">
            <h3 class="modal-title">
                {{ IsEdit ? 'Edit Client: ' + OriginalName : 'Add New Client' }}
            </h3>
        </div>

        <div class="modal-body">
            <div class="form-group">
                <label><strong>Name:</strong></label>
                <input type="text" class="form-control" ng-model="ModalClient.Name" />
            </div>

            <div class="form-group">
                <label><strong>Type:</strong></label>
                <client-type-selector model="ModalClient.Type"
                                      get-data="getType()"
                                      mode="form"
                                      is-edit="{{IsEdit}}">
                </client-type-selector>
            </div>

            <div class="form-group" ng-if="ModalClient.Type == 0">
                <label><strong>BirthDate:</strong></label>
                <input type="date" class="form-control" ng-model="ModalClient.BirthDate" />
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn btn-default" ng-click="cancel()">Cancel</button>
            <button class="btn btn-primary" ng-click="save()">
                {{ IsEdit ? 'Edit' : 'Add' }}
            </button>
        </div>
    </script>
    <!-- Reserve Modal -->
    <script type="text/ng-template" id="reserveModal.html">
        <div class="modal-header">
            <h3 class="modal-title">Reserve Phone Number for {{client.Name}}</h3>
        </div>
        <div class="modal-body">
            <label>Select Phone Number:</label>
            <select class="form-control" ng-model="reservation.PhoneNumberID" ng-options="phone.ID as phone.Number for phone in phoneNumbers">
                <option value=""> Select a number </option>
            </select>
            <div ng-show="errorMessage" class="alert alert-danger">{{errorMessage}}</div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-primary" ng-click="save()">Reserve</button>
            <button class="btn btn-default" ng-click="cancel()">Cancel</button>
        </div>
    </script>

    <!-- Unreserve Modal -->
    <script type="text/ng-template" id="unreserveModal.html">
        <div class="modal-header">
            <h3 class="modal-title">Unreserve Phone Number for {{client.Name}}</h3>
        </div>
        <div class="modal-body">
            <label>Select Phone Number to Unreserve:</label>
            <select class="form-control" ng-model="reservation.PhoneNumberID" ng-options="phone.ID as phone.Number for phone in reservedNumbers">
                <option value=""> Select a number </option>
            </select>
            <div ng-show="errorMessage" class="alert alert-danger">{{errorMessage}}</div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-danger" ng-click="confirmUnreserve()">Unreserve</button>
            <button class="btn btn-default" ng-click="cancel()">Cancel</button>
        </div>
    </script>
</body>
</html>
