<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Devices</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" />

    <!-- AngularJS -->
    <script src="../Scripts/angular.min.js"></script>
    <script src="../Scripts/angular-animate.min.js"></script>
    <script src="../Scripts/ui-bootstrap-tpls-0.14.3.min.js"></script>

    <!-- Your AngularJS App -->
    <script src="../Scripts/task3_js_http.js"></script>

    <link rel="stylesheet" href="../Content/task3_css.css" />

</head>
<body ng-app="deviceApp" ng-controller="DeviceCtrl">

    <div class="container" style="margin-top: 30px;">
        <h2 class="text-left">Devices</h2>

        <div class="form-inline text-left" style="margin-bottom: 20px;">
            <div class="form-group">
                <input type="text" class="form-control" ng-model="deviceName" placeholder="Device Name...">
            </div>
            <button class="btn btn-info" ng-click="searchDevices()">Search</button>
            <button class="btn btn-success" ng-click="openModal()">Add</button>
        </div>

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="device in filteredDevices">
                    <td>{{device.id}}</td>
                    <td>{{device.name}}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" ng-click="openModal(device)">Edit</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>


    <script type="text/ng-template" id="deviceModal.html">
        <div class="modal-header">
            <h3 class="modal-title">
                {{ isEdit ? 'Edit Device: ' + originalName : 'Add New Device' }}
            </h3>
        </div>

        <div class="modal-body">
            <div class="form-group">
                <label for="deviceInput"><strong>Device Name:</strong></label>
                <input type="text" id="deviceInput" class="form-control" ng-model="modalDevice.name" placeholder="Enter device name">
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn btn-default" ng-click="cancel()">Cancel</button>
            <button class="btn btn-primary" ng-click="save()">
                {{ isEdit ? 'Edit' : 'Add' }}
            </button>
        </div>
    </script>


</body>
</html>
