<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Client Management</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" />
    <script src="../Scripts/angular.min.js"></script>
    <script src="../Scripts/angular-animate.min.js"></script>
    <script src="../Scripts/ui-bootstrap-tpls-0.14.3.min.js"></script>
    <script src="../Scripts/client.js"></script>
    <link rel="stylesheet" href="../Content/client.css" />
</head>
<body ng-app="deviceApp" ng-controller="ClientCtrl">
    <nav class="navbar navbar-inverse">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="#">Task 4</a>
            </div>
            <ul class="nav navbar-nav">
                <li><a href="Task4.html">Devices</a></li>
                <li><a href="client.html">Clients</a></li>
                <li><a href="phonenumbers.html">Phone Numbers</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <h2>Clients</h2>

        <div class="form-inline">
            <input type="text" class="form-control" ng-model="searchName" placeholder="Search by name">
            <select class="form-control" ng-model="searchType">
                <option value="">All Types</option>
                <option value="0">Individual</option>
                <option value="1">Organization</option>
            </select>
            <button class="btn btn-primary" ng-click="filterClients()">Search</button>
            <button class="btn btn-success" ng-click="openModal()">Add</button>
        </div>

        <table class="table table-bordered" style="margin-top: 20px;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Birth Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="client in filteredClients">
                    <td>{{client.ID}}</td>
                    <td>{{client.Name}}</td>
                    <td>{{client.Type == 0 ? 'Individual' : 'Organization'}}</td>
                    <td>{{client.BirthDate | date : 'yyyy-MM-dd'}}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" ng-click="openModal(client)">Edit</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Modal Template -->
    <script type="text/ng-template" id="clientModal.html">
        <div class="modal-header">
            <h3 class="modal-title">
                {{ IsEdit ? 'Edit Client: ' + OriginalName : 'Add New Client' }}
            </h3>
        </div>

        <div class="modal-body">
            <div class="form-group">
                <label><strong>Name:</strong></label>
                <input type="text" class="form-control" ng-model="ModalClient.Name" />
            </div>

            <div class="form-group">
                <label><strong>Type:</strong></label>
                <select class="form-control" ng-model="ModalClient.Type" ng-change="onTypeChange()">
                    <option disabled selected value="">Select Type</option>
                    <option value="0">Individual</option>
                    <option value="1">Organization</option>
                </select>
            </div>

            <div class="form-group" ng-if="ModalClient.Type == 0">
                <label><strong>BirthDate:</strong></label>
                <input type="date" class="form-control" ng-model="ModalClient.BirthDate" />
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn btn-default" ng-click="cancel()">Cancel</button>
            <button class="btn btn-primary" ng-click="save()">
                {{ IsEdit ? 'Edit' : 'Add' }}
            </button>
        </div>
    </script>
</body>
</html>
